server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS. Combined with a variable in proxy_pass below, this
    # makes nginx re-resolve the backend on each request, so recreating the
    # backend container (new IP) never leaves nginx pinned to a stale upstream
    # (which previously caused 502s on every /api call after a backend redeploy).
    resolver 127.0.0.11 valid=10s ipv6=off;

    # API proxied to the backend service (variable forces per-request resolution).
    location /api/ {
        set $far_backend http://backend:8000;
        proxy_pass $far_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        # Allow add-paper PDF uploads up to the app's 30 MB cap; nginx's 1 MB
        # default would otherwise 413 most paper PDFs at the proxy.
        client_max_body_size 32m;
    }
    location = /health {
        set $far_backend_health http://backend:8000;
        proxy_pass $far_backend_health/health;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
